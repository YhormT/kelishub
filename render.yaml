# Render Blueprint — kellishub monorepo
# Docs: https://render.com/docs/blueprint-spec
# Deploy: Dashboard → New → Blueprint → connect this repo

databases:
  - name: kellishub-db
    plan: free
    databaseName: kellishub
    user: kellishub

services:
  # ── Backend API (Node + Express + Prisma) ─────────────────────────────
  - type: web
    name: kellishub-api
    runtime: node
    rootDir: backend-main
    plan: starter
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: node index.js
    healthCheckPath: /health
    buildFilter:
      paths:
        - backend-main/**
      ignoredPaths:
        - backend-main/**/*.md
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: kellishub-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CHAT_ENCRYPTION_KEY
        generateValue: true
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_CALLBACK_URL
        value: https://kellishub.com/shop
      - key: FRONTEND_URL
        value: https://kellishub.com
      - key: GMPL_API_URL
        value: https://api.gmpl.com
      - key: GMPL_API_KEY
        sync: false

  # ── Frontend (Vite static site) ───────────────────────────────────────
  - type: web
    name: kellishub-web
    runtime: static
    rootDir: frontend-main
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    buildFilter:
      paths:
        - frontend-main/**
      ignoredPaths:
        - frontend-main/dist/**
    routes:
      # React Router — rewrite client routes to index.html (required on Render)
      - type: rewrite
        source: /login
        destination: /index.html
      - type: rewrite
        source: /register
        destination: /index.html
      - type: rewrite
        source: /shop
        destination: /index.html
      - type: rewrite
        source: /admin
        destination: /index.html
      - type: rewrite
        source: /admin/*
        destination: /index.html
      - type: rewrite
        source: /user
        destination: /index.html
      - type: rewrite
        source: /premium
        destination: /index.html
      - type: rewrite
        source: /superagent
        destination: /index.html
      - type: rewrite
        source: /normalagent
        destination: /index.html
      - type: rewrite
        source: /otherdashboard
        destination: /index.html
      - type: rewrite
        source: /profile
        destination: /index.html
      - type: rewrite
        source: /store/*
        destination: /index.html
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Must match the Node API host (not the static site).
      - key: VITE_API_URL
        value: https://api.kellishub.com
